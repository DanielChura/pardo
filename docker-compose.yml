services:
  postgres:
    container_name: pardo-postgres
    image: postgres:18-alpine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: daniel
      POSTGRES_PASSWORD: daniel123
      POSTGRES_DB: pardo

  pgadmin:
    container_name: pardo-pgadmin4
    image: dpage/pgadmin4
    ports:
      - '5050:80'
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: danielchurarevilla74@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Danielantony74@
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

volumes:
  postgres_data:
